version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: product-inventory-postgres
    environment:
      POSTGRES_DB: product_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - product-net

  redis:
    image: redis:7-alpine
    container_name: product-inventory-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - product-net

  redis-insight:
    image: redis/redisinsight:latest
    container_name: sella-redis-insight
    restart: always
    ports:
      - "5540:5540"      # Open http://localhost:5540 in browser, redis://:sella123@sella-redis:6379
    depends_on:
      - redis
    networks:
      - product-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: product-inventory-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmindata:/var/lib/pgadmin
    networks:
      - product-net

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-prod
    ports:
      - "9411:9411"
    networks:
      - product-net

networks:
  product-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  pgadmindata:
