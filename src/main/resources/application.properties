spring.application.name=product-inventory-system

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/product_inventory
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Sentinel Configuration
spring.cache.type=redis
spring.data.redis.sentinel.master=master
spring.data.redis.sentinel.nodes=redis-ports
spring.redis.sentinel.master=master
spring.redis.sentinel.nodes=redis-ports

#Observability
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
